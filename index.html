<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Editor Website</title>
    <link rel="stylesheet" href="them.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <section>
            <div class="left">
                <div class="top">
                    <label for="image-input" class="btn" >
                        Choice Image
                        <input type="file" id="image-input"  accept="imge/*" hidden>
                    </label>
                    <button class="btn" id="reset_btn">Reset</button>
                    <button class="btn" id="download_btn">Downlod</button>

                     <h2>Resize & Compress</h2>
                    <!-- Resize & Compress Tools -->
                    <div class="resize-tools">

                       <!-- <label>Width</label>-->
                        <input type="number" class="valueinp" id="img_width" placeholder="Width">

                        <!--<label>Height</label>-->
                        <input type="number" class="valueinp" id="img_height" placeholder="Height">



                        
                        <input type="range" class="quility" id="img_quality">
                        <label class="quli">Quality</label>

                        <button class="btn" id="apply_resize">
                            Apply Resize
                        </button>


                    </div>
                    <!-- End Se3ction-->
  
                </div>
                <div class="bottom">
                    <div class="placeholder_img">
                        <i class="ri-imge-line"></i>
                    </div>
                    <canvas id="imge-canvas"></canvas>
                </div>
            </div>

            <div class="right">
                <h2>Filters</h2>
                <div class="filters">
                </div>
                <h2>Presets</h2>
                <div class="presets"></div>
            </div>

        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
